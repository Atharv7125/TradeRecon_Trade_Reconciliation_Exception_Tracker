<script>
  // Update exception badge after sidebar loads
  (function() {
    const stats = window.Storage?.Exceptions?.getStats();
    const badge = document.getElementById('sidebar-exceptions-badge');
    if (badge && stats && stats.open > 0) {
      badge.textContent = stats.open > 9 ? '9+' : stats.open;
      badge.style.display = 'inline-flex';
    }
  })();
</script>
