<header id="app-navbar" style="
  position: fixed;
  top: 0;
  left: var(--sidebar-width);
  right: 0;
  height: var(--navbar-height);
  background: var(--color-bg-surface);
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-6);
  z-index: 99;
  transition: left var(--transition-normal);
  gap: var(--space-4);
">

  <!-- Left: Breadcrumb / Page Context -->
  <div style="display:flex; align-items:center; gap:var(--space-3); flex: 1; min-width: 0;">
    <!-- Mobile hamburger -->
    <button
      id="mobile-menu-btn"
      aria-label="Toggle sidebar"
      style="display:none; background:none; border:none; color:var(--color-text-secondary); padding:var(--space-2); border-radius:var(--radius-md); cursor:pointer;"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- Search -->
    <div style="position:relative; max-width:320px; flex:1;">
      <svg style="position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--color-text-muted);" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="global-search"
        type="search"
        placeholder="Search trades, exceptions…"
        aria-label="Global search"
        style="
          width:100%; background:var(--color-bg-elevated); border:1px solid var(--color-border);
          border-radius:var(--radius-full); padding:0.45rem 1rem 0.45rem 2.2rem;
          color:var(--color-text-primary); font-size:0.8125rem;
          transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        "
        onfocus="this.style.borderColor='var(--color-accent)'; this.style.boxShadow='0 0 0 3px var(--color-accent-glow)';"
        onblur="this.style.borderColor='var(--color-border)'; this.style.boxShadow='none';"
      />
    </div>
  </div>

  <!-- Right: Actions -->
  <div style="display:flex; align-items:center; gap:var(--space-3); flex-shrink:0;">

    <!-- Last Recon Run -->
    <div id="nav-recon-status" style="
      display:flex; align-items:center; gap:var(--space-2); font-size:0.75rem;
      color:var(--color-text-muted); padding:var(--space-2) var(--space-3);
      background:var(--color-bg-elevated); border:1px solid var(--color-border);
      border-radius:var(--radius-full); white-space:nowrap;
    ">
      <span style="width:7px; height:7px; border-radius:50%; background:var(--color-success); display:inline-block; animation: pulse-accent 2s infinite;"></span>
      <span id="nav-recon-label">System Nominal</span>
    </div>

    <!-- Notifications -->
    <div style="position:relative;">
      <button
        id="notifications-btn"
        aria-label="Notifications"
        aria-expanded="false"
        style="
          background:var(--color-bg-elevated); border:1px solid var(--color-border);
          border-radius:var(--radius-md); padding:var(--space-2); color:var(--color-text-secondary);
          transition: all var(--transition-fast); cursor:pointer;
          display:flex; align-items:center; justify-content:center;
        "
        onmouseover="this.style.color='var(--color-text-primary)'; this.style.borderColor='var(--color-accent)';"
        onmouseout="this.style.color='var(--color-text-secondary)'; this.style.borderColor='var(--color-border)';"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <span
        id="notification-badge"
        class="hidden"
        style="
          position:absolute; top:-5px; right:-5px;
          background:var(--color-danger); color:#fff;
          font-size:0.5625rem; font-weight:700;
          min-width:16px; height:16px; border-radius:var(--radius-full);
          display:flex; align-items:center; justify-content:center;
          border: 2px solid var(--color-bg-surface);
        "
      >0</span>
    </div>

    <!-- User Dropdown -->
    <div style="position:relative;">
      <button
        id="user-menu-btn"
        aria-label="User menu"
        aria-expanded="false"
        style="
          display:flex; align-items:center; gap:var(--space-2);
          background:var(--color-bg-elevated); border:1px solid var(--color-border);
          border-radius:var(--radius-lg); padding:var(--space-2) var(--space-3) var(--space-2) var(--space-2);
          cursor:pointer; transition: border-color var(--transition-fast);
        "
        onmouseover="this.style.borderColor='var(--color-accent)';"
        onmouseout="this.style.borderColor='var(--color-border)';"
      >
        <div class="avatar avatar-sm" id="nav-user-avatar" aria-hidden="true">--</div>
        <span id="nav-user-name" style="font-size:0.8125rem; font-weight:600; color:var(--color-text-primary); white-space:nowrap; max-width:120px; overflow:hidden; text-overflow:ellipsis;">Loading</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <!-- Dropdown -->
      <div
        id="user-dropdown"
        style="
          display:none; position:absolute; right:0; top:calc(100% + 8px);
          background:var(--color-bg-surface); border:1px solid var(--color-border);
          border-radius:var(--radius-lg); padding:var(--space-2); min-width:180px;
          box-shadow:var(--shadow-lg); z-index:200;
        "
      >
        <a href="profile.html" style="display:flex; align-items:center; gap:var(--space-3); padding:var(--space-2) var(--space-3); border-radius:var(--radius-md); color:var(--color-text-secondary); font-size:0.875rem; transition:background var(--transition-fast);" onmouseover="this.style.background='var(--color-bg-elevated)';" onmouseout="this.style.background='transparent';">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
        <a href="audit.html" style="display:flex; align-items:center; gap:var(--space-3); padding:var(--space-2) var(--space-3); border-radius:var(--radius-md); color:var(--color-text-secondary); font-size:0.875rem; transition:background var(--transition-fast);" onmouseover="this.style.background='var(--color-bg-elevated)';" onmouseout="this.style.background='transparent';">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Audit Trail
        </a>
        <div style="height:1px; background:var(--color-border); margin:var(--space-2) 0;"></div>
        <button
          onclick="Storage.Session.destroy(); window.location.href='login.html';"
          style="display:flex; align-items:center; gap:var(--space-3); width:100%; padding:var(--space-2) var(--space-3); border-radius:var(--radius-md); color:var(--color-danger); font-size:0.875rem; background:none; border:none; cursor:pointer; text-align:left; transition:background var(--transition-fast);"
          onmouseover="this.style.background='var(--color-danger-bg)';"
          onmouseout="this.style.background='transparent';"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </button>
      </div>
    </div>

  </div>
</header>

<script>
  // User dropdown toggle
  (function() {
    const btn = document.getElementById('user-menu-btn');
    const dd  = document.getElementById('user-dropdown');
    if (!btn || !dd) return;

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const open = dd.style.display === 'block';
      dd.style.display = open ? 'none' : 'block';
      btn.setAttribute('aria-expanded', !open);
    });
    document.addEventListener('click', () => {
      dd.style.display = 'none';
      btn.setAttribute('aria-expanded', 'false');
    });

    // Mobile hamburger wires up to sidebar mobile-open class
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const sidebar   = document.getElementById('app-sidebar');
    if (mobileBtn && sidebar) {
      mobileBtn.addEventListener('click', () => sidebar.classList.toggle('mobile-open'));
    }
  })();
</script>
